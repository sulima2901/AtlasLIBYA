{% extends "core/base.html" %}
{% load static %}
{% block title %}كل المنتجات | AtlasLY{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <div id="productsTopSearch" class="products-top-search">
      <form id="productsSearchForm" class="d-flex gap-2 justify-content-center" method="get" action=".">
        <div class="input-group" style="max-width:720px;">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input type="search" class="form-control" name="q" value="{{ request.GET.q }}" placeholder="ابحث عن منتج...">
          <button class="btn btn-primary" type="submit">بحث</button>
        </div>
      </form>
    </div>

    <div class="row g-4 mt-1">
      <aside class="col-12 col-lg-3">
        <div class="sticky-aside">
          <form id="filtersForm" method="get" action=".">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title mb-3">الفلاتر</h5>
                {% if categories %}
                  <div class="mb-3">
                    <label class="form-label">التصنيف</label>
                    <select class="form-select" name="category">
                      <option value="">الكل</option>
                      {% for cat in categories %}
                        <option value="{{ cat.slug }}" {% if request.GET.category == cat.slug %}selected{% endif %}>{{ cat.name }}</option>
                      {% endfor %}
                    </select>
                  </div>
                {% endif %}
                <div class="mb-3">
                  <label class="form-label">نطاق السعر</label>
                  <div class="d-flex gap-2">
                    <input class="form-control" type="number" name="min_price" placeholder="من" value="{{ request.GET.min_price }}">
                    <input class="form-control" type="number" name="max_price" placeholder="إلى" value="{{ request.GET.max_price }}">
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label">الترتيب</label>
                  <select class="form-select" name="sort">
                    <option value="">الافتراضي</option>
                    <option value="newest" {% if request.GET.sort == 'newest' %}selected{% endif %}>الأحدث</option>
                    <option value="price_asc" {% if request.GET.sort == 'price_asc' %}selected{% endif %}>الأرخص</option>
                    <option value="price_desc" {% if request.GET.sort == 'price_desc' %}selected{% endif %}>الأغلى</option>
                    <option value="name" {% if request.GET.sort == 'name' %}selected{% endif %}>الاسم</option>
                  </select>
                </div>
                <div class="d-grid gap-2">
                  <button class="btn btn-primary" type="submit">تطبيق</button>
                  <a class="btn btn-outline-secondary" href="{% url 'products:products_list' %}">إزالة الكل</a>
                </div>
              </div>
            </div>
          </form>
        </div>
      </aside>

      <div class="col-12 col-lg-9" id="productsArea">
        {% include 'products/_grid.html' %}
      </div>
    </div>
  </div>
</section>
{% endblock %}
