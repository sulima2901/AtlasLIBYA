{% load static %}
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | AtlasLY</title>
    <link rel="stylesheet" href="{% static 'accounts/style.css' %}">
</head>
<body>
    <div class="atlas-container">
        <img src="{% static 'accounts/atlas_logo.png' %}" alt="Atlas Libya Logo" class="logo">
        <h2>تسجيل الدخول</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="atlas-btn">دخول</button>
        </form>
        <p>ليس لديك حساب؟ <a href="{% url 'accounts:register' %}">سجل الآن</a></p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
